    <style>
      body {
        font-family: 'DM Sans', 'Spoqa Han Sans Neo', sans-serif;
      }
      .seat-transition {
        transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.3s ease;
      }
      .seat-pop {
        animation: seatPop 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
      }
      @keyframes seatPop {
        from { transform: scale(0.8); opacity: 0.5; }
        to { transform: scale(1); opacity: 1; }
      }
      .shuffle-shake {
        animation: shuffleShake 0.1s ease-in-out infinite;
      }
      @keyframes shuffleShake {
        0%, 100% { transform: translateX(0); }
        25% { transform: translateX(-3px); }
        75% { transform: translateX(3px); }
      }
      .seat-highlight {
        animation: greenPulse 0.6s ease-out forwards;
      }
      @keyframes greenPulse {
        0% { box-shadow: 0 0 0 0 rgba(5, 150, 105, 0.5); border-color: #059669; }
        50% { box-shadow: 0 0 12px 4px rgba(5, 150, 105, 0.3); border-color: #059669; }
        100% { box-shadow: 0 0 0 0 rgba(5, 150, 105, 0); border-color: #e5e7eb; }
      }
    </style>
