<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>경제 아카데미 — 100개 핵심 용어 마스터</title>

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              primary: { DEFAULT: '#0D9488', dark: '#0F766E', light: '#CCFBF1' },
              secondary: { DEFAULT: '#D97706', light: '#FEF3C7' },
              surface: { DEFAULT: '#FAFAF9', card: '#FFFFFF' },
              border: '#E7E5E4',
              ink: { DEFAULT: '#1C1917', secondary: '#78716C', disabled: '#D6D3D1' },
              locked: '#A8A29E',
              success: '#16A34A',
              warning: '#CA8A04',
              error: '#DC2626',
              info: '#2563EB',

            fontFamily: {
              display: ['"Space Grotesk"', 'sans-serif'],
              body: ['Pretendard', '-apple-system', 'BlinkMacSystemFont', 'sans-serif'],

            borderRadius: {
              sm: '4px',
              md: '8px',

          },

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />

    <style>
      body {
        font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
        background-color: #FAFAF9;
        color: #1C1917;

      }

  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
