<!DOCTYPE html>

<html lang="ko"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;family=Noto+Sans+KR:wght@300;400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#5b13ec",
                        "primary-soft": "#ede7fe",
                        "accent-pink": "#fce7f3",
                        "background-light": "#fdfcfd",
                        "background-dark": "#161022",
                    },
                    fontFamily: {
                        "display": ["Plus Jakarta Sans", "Noto Sans KR", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Plus Jakarta Sans', 'Noto Sans KR', sans-serif;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 antialiased">
<div class="relative flex h-screen w-full flex-col overflow-hidden bg-gradient-to-b from-primary-soft/40 via-white to-white">
<!-- Main Content Area -->
<div class="flex flex-col items-center justify-center grow px-8 space-y-8">
<!-- Illustration Area -->
<div class="w-full max-w-[280px] aspect-square flex items-center justify-center relative">
<!-- Decorative Background Circles -->
<div class="absolute inset-0 bg-primary/5 rounded-full blur-3xl"></div>
<!-- Main Illustration: Stylized Prescription Bottle -->
<div class="relative z-10 w-48 h-48 flex items-center justify-center">
<div class="w-24 h-32 bg-white border-4 border-primary/20 rounded-xl relative shadow-sm overflow-hidden">
<div class="w-full h-8 bg-primary/10 border-b-2 border-primary/10"></div>
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-12 h-12 bg-accent-pink/40 rounded-full flex items-center justify-center">
<span class="material-symbols-outlined text-primary scale-125">medical_services</span>
</div>
<div class="absolute bottom-2 left-2 right-2 h-1 bg-slate-100 rounded-full"></div>
<div class="absolute bottom-4 left-2 right-4 h-1 bg-slate-100 rounded-full"></div>
</div>
<!-- Floating Icons around the bottle -->
<div class="absolute -top-2 -right-2 w-10 h-10 bg-accent-pink rounded-full flex items-center justify-center shadow-md">
<span class="material-symbols-outlined text-primary text-xl">favorite</span>
</div>
<div class="absolute bottom-4 -left-4 w-12 h-12 bg-primary-soft rounded-full flex items-center justify-center shadow-md">
<span class="material-symbols-outlined text-primary text-2xl">sentiment_satisfied</span>
</div>
</div>
</div>
<!-- Typography Area -->
<div class="text-center space-y-4">
<h1 class="text-slate-800 dark:text-slate-100 text-3xl font-bold tracking-tight">
                    오늘의 감정 처방전
                </h1>
<p class="text-slate-500 dark:text-slate-400 text-lg font-medium">
                    지금 기분이 어때요?
                </p>
</div>
<!-- Action Area -->
<div class="w-full max-w-xs space-y-4 pt-4">
<button class="w-full py-4 px-6 bg-primary text-white rounded-full font-bold text-lg shadow-lg shadow-primary/30 hover:shadow-primary/40 transition-shadow flex items-center justify-center gap-2">
<span>처방 받으러 가기</span>
<span class="material-symbols-outlined text-xl">arrow_forward</span>
</button>
<p class="text-slate-400 text-center text-sm font-medium">
                    1분이면 충분해요
                </p>
</div>
</div>
<!-- Footer -->
<div class="pb-10 pt-4 flex flex-col items-center">
<button class="text-slate-400 hover:text-primary font-medium text-sm transition-colors flex items-center gap-1">
                기록 보기
                <span class="material-symbols-outlined text-sm">history</span>
</button>
<!-- Safe area indicator for modern mobile devices -->
<div class="mt-6 w-32 h-1.5 bg-slate-200/50 rounded-full"></div>
</div>
</div>
</body></html>
