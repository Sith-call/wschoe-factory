<!DOCTYPE html>

<html lang="ko"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#5b13ec",
                        "background-light": "#f6f6f8",
                        "background-dark": "#161022",
                    },
                    fontFamily: {
                        "display": ["Plus Jakarta Sans", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display antialiased">
<div class="mx-auto min-h-screen max-w-[430px] bg-white dark:bg-background-dark shadow-2xl flex flex-col">
<!-- Top App Bar -->
<header class="flex items-center px-4 pt-6 pb-2 justify-between bg-white dark:bg-background-dark">
<button class="text-slate-900 dark:text-slate-100 flex size-10 shrink-0 items-center justify-center hover:bg-slate-100 dark:hover:bg-slate-800 rounded-full transition-colors">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-tight flex-1 text-center pr-10">상황 선택</h2>
</header>
<!-- Progress Bar Section -->
<div class="flex flex-col gap-3 p-6 pt-2">
<div class="flex justify-between items-end">
<p class="text-primary text-base font-bold leading-none">75% 완료</p>
<p class="text-slate-500 dark:text-slate-400 text-sm font-medium leading-none">3 / 4 Steps</p>
</div>
<div class="h-2 rounded-full bg-slate-100 dark:bg-slate-800 overflow-hidden">
<div class="h-full rounded-full bg-primary" style="width: 75%;"></div>
</div>
</div>
<!-- Hero Text -->
<div class="px-6 pt-4 pb-2">
<h1 class="text-slate-900 dark:text-slate-100 text-[28px] font-bold leading-tight mb-2">어떤 상황인가요?</h1>
<p class="text-slate-500 dark:text-slate-400 text-base font-medium">감정의 원인을 알려주세요</p>
</div>
<!-- Selection Grid -->
<div class="grid grid-cols-2 gap-4 p-6 overflow-y-auto flex-1">
<!-- Selected Card: Work/School -->
<button class="flex flex-col items-center justify-center gap-4 p-5 rounded-xl bg-primary/5 border-2 border-primary shadow-lg shadow-primary/10 transition-all text-left">
<div class="w-16 h-16 rounded-full bg-primary/10 flex items-center justify-center">
<span class="material-symbols-outlined text-primary text-3xl">corporate_fare</span>
</div>
<div class="text-center">
<p class="text-slate-900 dark:text-slate-100 text-base font-bold">직장/학교</p>
<p class="text-primary text-xs font-semibold mt-1">선택됨</p>
</div>
</button>
<!-- Card: Partner/Family -->
<button class="flex flex-col items-center justify-center gap-4 p-5 rounded-xl bg-white dark:bg-slate-800 border-2 border-transparent shadow-sm hover:shadow-md transition-all text-left">
<div class="w-16 h-16 rounded-full bg-slate-50 dark:bg-slate-700 flex items-center justify-center">
<span class="material-symbols-outlined text-slate-600 dark:text-slate-300 text-3xl">favorite</span>
</div>
<div class="text-center">
<p class="text-slate-900 dark:text-slate-100 text-base font-medium">연인/가족</p>
</div>
</button>
<!-- Card: Relationships -->
<button class="flex flex-col items-center justify-center gap-4 p-5 rounded-xl bg-white dark:bg-slate-800 border-2 border-transparent shadow-sm hover:shadow-md transition-all text-left">
<div class="w-16 h-16 rounded-full bg-slate-50 dark:bg-slate-700 flex items-center justify-center">
<span class="material-symbols-outlined text-slate-600 dark:text-slate-300 text-3xl">groups</span>
</div>
<div class="text-center">
<p class="text-slate-900 dark:text-slate-100 text-base font-medium">대인관계</p>
</div>
</button>
<!-- Card: Money/Future -->
<button class="flex flex-col items-center justify-center gap-4 p-5 rounded-xl bg-white dark:bg-slate-800 border-2 border-transparent shadow-sm hover:shadow-md transition-all text-left">
<div class="w-16 h-16 rounded-full bg-slate-50 dark:bg-slate-700 flex items-center justify-center">
<span class="material-symbols-outlined text-slate-600 dark:text-slate-300 text-3xl">savings</span>
</div>
<div class="text-center">
<p class="text-slate-900 dark:text-slate-100 text-base font-medium">돈/미래</p>
</div>
</button>
<!-- Card: Alone Time -->
<button class="flex flex-col items-center justify-center gap-4 p-5 rounded-xl bg-white dark:bg-slate-800 border-2 border-transparent shadow-sm hover:shadow-md transition-all text-left">
<div class="w-16 h-16 rounded-full bg-slate-50 dark:bg-slate-700 flex items-center justify-center">
<span class="material-symbols-outlined text-slate-600 dark:text-slate-300 text-3xl">self_improvement</span>
</div>
<div class="text-center">
<p class="text-slate-900 dark:text-slate-100 text-base font-medium">혼자만의 시간</p>
</div>
</button>
<!-- Card: Not Sure -->
<button class="flex flex-col items-center justify-center gap-4 p-5 rounded-xl bg-white dark:bg-slate-800 border-2 border-transparent shadow-sm hover:shadow-md transition-all text-left">
<div class="w-16 h-16 rounded-full bg-slate-50 dark:bg-slate-700 flex items-center justify-center">
<span class="material-symbols-outlined text-slate-600 dark:text-slate-300 text-3xl">help_outline</span>
</div>
<div class="text-center">
<p class="text-slate-900 dark:text-slate-100 text-base font-medium">모르겠음</p>
</div>
</button>
</div>
<!-- Bottom Action Button -->
<div class="p-6 pt-2 pb-10 bg-white dark:bg-background-dark">
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4 rounded-full shadow-lg shadow-primary/30 transition-all flex items-center justify-center gap-2">
<span>처방전 받기</span>
<span class="material-symbols-outlined">auto_awesome</span>
</button>
</div>
</div>
</body></html>
