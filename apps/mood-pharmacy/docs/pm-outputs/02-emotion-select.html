<!DOCTYPE html>

<html lang="ko"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary": "#5b13ec",
              "background-light": "#f6f6f8",
              "background-dark": "#161022",
            },
            fontFamily: {
              "display": ["Plus Jakarta Sans", "Noto Sans KR", "sans-serif"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
      body {
        font-family: 'Plus Jakarta Sans', 'Noto Sans KR', sans-serif;
      }
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      .selected-card {
        border: 2px solid #5b13ec;
        background-color: rgba(91, 19, 236, 0.05);
      }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark min-h-screen flex flex-col">
<div class="max-w-md mx-auto w-full bg-background-light dark:bg-background-dark min-h-screen flex flex-col relative pb-24">
<header class="sticky top-0 z-10 bg-background-light/80 dark:bg-background-dark/80 backdrop-blur-md">
<div class="flex items-center p-4 justify-between">
<button class="text-slate-900 dark:text-slate-100 flex items-center justify-center p-2">
<span class="material-symbols-outlined">arrow_back_ios</span>
</button>
<h1 class="text-slate-900 dark:text-slate-100 text-lg font-bold flex-1 text-center pr-10">기분 처방</h1>
</div>
<div class="px-6 py-2">
<div class="flex justify-between items-end mb-2">
<span class="text-primary font-bold text-sm">Step 1</span>
<span class="text-slate-500 dark:text-slate-400 text-xs font-medium">1/4</span>
</div>
<div class="w-full bg-slate-200 dark:bg-slate-700 h-1.5 rounded-full overflow-hidden">
<div class="bg-primary h-full w-1/4 rounded-full"></div>
</div>
</div>
</header>
<main class="flex-1 px-6 pt-8">
<div class="mb-8">
<h2 class="text-slate-900 dark:text-slate-100 text-2xl font-bold leading-tight mb-2">
                    지금 느끼는 감정을<br/>골라주세요
                </h2>
<p class="text-slate-500 dark:text-slate-400 text-base">
                    최대 3개까지 선택할 수 있어요
                </p>
</div>
<div class="grid grid-cols-2 gap-4 mb-8">
<!-- Selected Card: 기쁨 -->
<div class="relative group">
<div class="selected-card p-4 rounded-xl shadow-sm flex flex-col items-center justify-center aspect-square transition-all duration-200 cursor-pointer border-2 border-primary">
<div class="absolute top-2 right-2 bg-primary text-white rounded-full p-0.5 flex items-center justify-center">
<span class="material-symbols-outlined text-[16px] font-bold">check</span>
</div>
<div class="w-16 h-16 mb-3 rounded-full bg-yellow-100 flex items-center justify-center">
<span class="material-symbols-outlined text-4xl text-yellow-500">sentiment_very_satisfied</span>
</div>
<span class="text-slate-900 dark:text-slate-100 font-bold">기쁨</span>
</div>
</div>
<!-- Card: 슬픔 -->
<div class="bg-white dark:bg-slate-800 p-4 rounded-xl shadow-sm border-2 border-transparent flex flex-col items-center justify-center aspect-square transition-all duration-200 cursor-pointer">
<div class="w-16 h-16 mb-3 rounded-full bg-blue-50 flex items-center justify-center">
<span class="material-symbols-outlined text-4xl text-blue-400">sentiment_dissatisfied</span>
</div>
<span class="text-slate-900 dark:text-slate-100 font-medium">슬픔</span>
</div>
<!-- Card: 분노 -->
<div class="bg-white dark:bg-slate-800 p-4 rounded-xl shadow-sm border-2 border-transparent flex flex-col items-center justify-center aspect-square transition-all duration-200 cursor-pointer">
<div class="w-16 h-16 mb-3 rounded-full bg-red-50 flex items-center justify-center">
<span class="material-symbols-outlined text-4xl text-red-400">mood_bad</span>
</div>
<span class="text-slate-900 dark:text-slate-100 font-medium">분노</span>
</div>
<!-- Card: 불안 -->
<div class="bg-white dark:bg-slate-800 p-4 rounded-xl shadow-sm border-2 border-transparent flex flex-col items-center justify-center aspect-square transition-all duration-200 cursor-pointer">
<div class="w-16 h-16 mb-3 rounded-full bg-orange-50 flex items-center justify-center">
<span class="material-symbols-outlined text-4xl text-orange-400">psychology_alt</span>
</div>
<span class="text-slate-900 dark:text-slate-100 font-medium">불안</span>
</div>
<!-- Card: 무기력 -->
<div class="bg-white dark:bg-slate-800 p-4 rounded-xl shadow-sm border-2 border-transparent flex flex-col items-center justify-center aspect-square transition-all duration-200 cursor-pointer">
<div class="w-16 h-16 mb-3 rounded-full bg-slate-100 flex items-center justify-center">
<span class="material-symbols-outlined text-4xl text-slate-400">bedtime</span>
</div>
<span class="text-slate-900 dark:text-slate-100 font-medium">무기력</span>
</div>
<!-- Selected Card: 스트레스 -->
<div class="relative group">
<div class="selected-card p-4 rounded-xl shadow-sm flex flex-col items-center justify-center aspect-square transition-all duration-200 cursor-pointer border-2 border-primary">
<div class="absolute top-2 right-2 bg-primary text-white rounded-full p-0.5 flex items-center justify-center">
<span class="material-symbols-outlined text-[16px] font-bold">check</span>
</div>
<div class="w-16 h-16 mb-3 rounded-full bg-purple-100 flex items-center justify-center">
<span class="material-symbols-outlined text-4xl text-purple-500">bolt</span>
</div>
<span class="text-slate-900 dark:text-slate-100 font-bold">스트레스</span>
</div>
</div>
<!-- Card: 설렘 -->
<div class="bg-white dark:bg-slate-800 p-4 rounded-xl shadow-sm border-2 border-transparent flex flex-col items-center justify-center aspect-square transition-all duration-200 cursor-pointer">
<div class="w-16 h-16 mb-3 rounded-full bg-pink-50 flex items-center justify-center">
<span class="material-symbols-outlined text-4xl text-pink-400">favorite</span>
</div>
<span class="text-slate-900 dark:text-slate-100 font-medium">설렘</span>
</div>
<!-- Card: 공허 -->
<div class="bg-white dark:bg-slate-800 p-4 rounded-xl shadow-sm border-2 border-transparent flex flex-col items-center justify-center aspect-square transition-all duration-200 cursor-pointer">
<div class="w-16 h-16 mb-3 rounded-full bg-gray-100 flex items-center justify-center">
<span class="material-symbols-outlined text-4xl text-gray-400">cloud</span>
</div>
<span class="text-slate-900 dark:text-slate-100 font-medium">공허</span>
</div>
</div>
</main>
<!-- Bottom Actions -->
<div class="fixed bottom-0 left-0 right-0 max-w-md mx-auto p-6 bg-gradient-to-t from-background-light dark:from-background-dark via-background-light/95 dark:via-background-dark/95 to-transparent">
<div class="text-center mb-4">
<span class="text-primary font-semibold text-sm">2/3 선택됨</span>
</div>
<button class="w-full bg-primary text-white py-4 rounded-full font-bold text-lg shadow-lg shadow-primary/30 active:scale-95 transition-transform">
                다음
            </button>
</div>
</div>
</body></html>
