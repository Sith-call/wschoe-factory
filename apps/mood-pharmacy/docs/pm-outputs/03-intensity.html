<!DOCTYPE html>

<html lang="ko"><head>
<meta charset="utf-8"/>
<meta content="width=430, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#5b13ec",
                        "background-light": "#f6f6f8",
                        "background-dark": "#161022",
                    },
                    fontFamily: {
                        "display": ["Plus Jakarta Sans", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "2xl": "1.5rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased min-h-screen flex flex-col items-center">
<div class="w-[430px] min-h-screen bg-gradient-to-b from-primary/5 via-background-light to-background-light dark:from-primary/10 dark:via-background-dark dark:to-background-dark flex flex-col shadow-2xl relative overflow-hidden">
<!-- Top App Bar -->
<header class="p-6 flex flex-col gap-4">
<div class="flex items-center justify-between">
<button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-primary/10 transition-colors">
<span class="material-symbols-outlined text-slate-900 dark:text-slate-100">arrow_back</span>
</button>
<h1 class="text-lg font-bold">감정의 강도</h1>
<div class="w-10"></div> <!-- Spacer for centering -->
</div>
<!-- Progress Bar Section -->
<div class="flex flex-col gap-2 mt-2">
<div class="flex justify-between items-end">
<span class="text-sm font-semibold text-primary">진행 단계</span>
<span class="text-xs font-medium text-slate-500">2 / 4</span>
</div>
<div class="h-2 w-full bg-primary/20 rounded-full overflow-hidden">
<div class="h-full bg-primary rounded-full transition-all duration-500" style="width: 50%;"></div>
</div>
</div>
</header>
<!-- Content Area -->
<main class="flex-1 px-6 py-4 flex flex-col gap-6">
<div class="text-center mb-4">
<h2 class="text-2xl font-bold leading-tight">감정의 강도를<br/>조절해주세요</h2>
<p class="text-slate-500 dark:text-slate-400 mt-2 text-sm">현재 느끼시는 감정의 크기는 어느 정도인가요?</p>
</div>
<!-- Sadness Card -->
<div class="bg-white dark:bg-slate-800/50 p-8 rounded-2xl shadow-sm border border-primary/5 flex flex-col items-center gap-6">
<div class="w-20 h-20 bg-primary/10 rounded-full flex items-center justify-center">
<span class="material-symbols-outlined text-primary text-5xl">sentiment_dissatisfied</span>
</div>
<div class="text-center">
<h3 class="text-xl font-bold">슬픔</h3>
<p class="text-primary font-semibold mt-1">꽤 (4단계)</p>
</div>
<div class="w-full space-y-4">
<div class="relative h-6 flex items-center">
<div class="absolute w-full h-1.5 bg-primary/20 rounded-full"></div>
<div class="absolute h-1.5 bg-primary rounded-full" style="width: 75%;"></div>
<!-- Thumb at 'Quite' (Level 4/5) -->
<div class="absolute w-6 h-6 bg-primary border-4 border-white dark:border-slate-800 rounded-full shadow-lg" style="left: 75%; transform: translateX(-50%);"></div>
</div>
<div class="flex justify-between text-[10px] font-medium text-slate-400 px-1">
<span>살짝</span>
<span>조금</span>
<span>보통</span>
<span class="text-primary font-bold">꽤</span>
<span>매우</span>
</div>
</div>
</div>
<!-- Stress Card -->
<div class="bg-white dark:bg-slate-800/50 p-8 rounded-2xl shadow-sm border border-primary/5 flex flex-col items-center gap-6">
<div class="w-16 h-16 bg-primary/10 rounded-full flex items-center justify-center">
<span class="material-symbols-outlined text-primary text-4xl">bolt</span>
</div>
<div class="text-center">
<h3 class="text-xl font-bold">스트레스</h3>
<p class="text-primary/70 font-semibold mt-1">보통 (3단계)</p>
</div>
<div class="w-full space-y-4">
<div class="relative h-6 flex items-center">
<div class="absolute w-full h-1.5 bg-primary/20 rounded-full"></div>
<div class="absolute h-1.5 bg-primary rounded-full" style="width: 50%;"></div>
<!-- Thumb at 'Moderate' (Level 3/5) -->
<div class="absolute w-6 h-6 bg-primary border-4 border-white dark:border-slate-800 rounded-full shadow-lg" style="left: 50%; transform: translateX(-50%);"></div>
</div>
<div class="flex justify-between text-[10px] font-medium text-slate-400 px-1">
<span>살짝</span>
<span>조금</span>
<span class="text-primary font-bold">보통</span>
<span>꽤</span>
<span>매우</span>
</div>
</div>
</div>
</main>
<!-- Bottom Navigation -->
<footer class="p-6 pt-2 pb-10 bg-gradient-to-t from-background-light dark:from-background-dark to-transparent">
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4 rounded-xl shadow-xl shadow-primary/20 transition-all flex items-center justify-center gap-2">
                다음
                <span class="material-symbols-outlined">arrow_forward</span>
</button>
</footer>
<!-- Decorative background elements -->
<div class="absolute -top-20 -right-20 w-64 h-64 bg-primary/5 rounded-full blur-3xl pointer-events-none"></div>
<div class="absolute top-1/2 -left-32 w-80 h-80 bg-primary/10 rounded-full blur-3xl pointer-events-none"></div>
</div>
</body></html>
