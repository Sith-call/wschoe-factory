<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>밸런스 게임</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "surface": "#111417",
              "surface-container-low": "#191c1f",
              "surface-container": "#1d2023",
              "surface-container-high": "#282a2e",
              "surface-container-highest": "#323539",
              "surface-bright": "#37393d",
              "on-surface": "#e1e2e7",
              "on-surface-variant": "#c7c5ce",
              "outline": "#919097",
              "outline-variant": "#46464d",
              "primary": "#fbbc00",
              "secondary": "#ffb77d",
              "on-primary": "#402d00",
              night: {
                50: '#f0f0f8',
                100: '#e1e2e7',
                200: '#c7c5ce',
                300: '#919097',
                400: '#46464d',
                500: '#323539',
                600: '#282a2e',
                700: '#1d2023',
                800: '#191c1f',
                900: '#111417',
                950: '#0c0e12',
              },
              warm: {
                amber: '#fbbc00',
                orange: '#ffb77d',
                pink: '#e87c8a',
                peach: '#f0b8a0',
              },
            },
            fontFamily: {
              headline: ['Manrope', 'Noto Sans KR', 'sans-serif'],
              body: ['Plus Jakarta Sans', 'Noto Sans KR', 'sans-serif'],
              sans: ['Plus Jakarta Sans', 'Noto Sans KR', 'sans-serif'],
            }
          }
        }
      }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&family=Plus+Jakarta+Sans:wght@400;500;600&family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Plus Jakarta Sans', 'Noto Sans KR', sans-serif;
        background-color: #111417;
        color: #e1e2e7;
        overflow-x: hidden;
      }

      .text-gradient {
        background: linear-gradient(135deg, #fbbc00 0%, #ffb77d 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      .btn-gradient {
        background: linear-gradient(135deg, #fbbc00 0%, #ffb77d 100%);
      }

      .option-a-gradient {
        background: linear-gradient(135deg, #fbbc00 0%, #f59e0b 50%, #d97706 100%);
      }

      .option-b-gradient {
        background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 50%, #a855f7 100%);
      }

      .option-a-bg {
        background: linear-gradient(135deg, rgba(251, 188, 0, 0.12) 0%, rgba(245, 158, 11, 0.08) 100%);
        border: 1px solid rgba(251, 188, 0, 0.25);
      }

      .option-b-bg {
        background: linear-gradient(135deg, rgba(99, 102, 241, 0.12) 0%, rgba(139, 92, 246, 0.08) 100%);
        border: 1px solid rgba(99, 102, 241, 0.25);
      }

      .option-a-bg-selected {
        background: linear-gradient(135deg, rgba(251, 188, 0, 0.25) 0%, rgba(245, 158, 11, 0.18) 100%);
        border: 2px solid rgba(251, 188, 0, 0.6);
      }

      .option-b-bg-selected {
        background: linear-gradient(135deg, rgba(99, 102, 241, 0.25) 0%, rgba(139, 92, 246, 0.18) 100%);
        border: 2px solid rgba(99, 102, 241, 0.6);
      }

      /* Animations */
      @keyframes fadeInUp {
        from { opacity: 0; transform: translateY(24px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .animate-fade-in-up { animation: fadeInUp 500ms ease-out forwards; }

      @keyframes fadeInDown {
        from { opacity: 0; transform: translateY(-24px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .animate-fade-in-down { animation: fadeInDown 500ms ease-out forwards; }

      @keyframes scaleIn {
        from { opacity: 0; transform: scale(0.8); }
        to { opacity: 1; transform: scale(1); }
      }
      .animate-scale-in { animation: scaleIn 300ms ease-out forwards; }

      @keyframes slideInFromBottom {
        from { opacity: 0; transform: translateY(60px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .animate-slide-in-bottom { animation: slideInFromBottom 500ms cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }

      @keyframes pulse {
        0%, 100% { opacity: 1; transform: scale(1); }
        50% { opacity: 0.7; transform: scale(1.08); }
      }
      .animate-pulse-custom { animation: pulse 2s ease-in-out infinite; }

      @keyframes neonGlow {
        0%, 100% {
          text-shadow: 0 0 10px rgba(251, 188, 0, 0.6), 0 0 20px rgba(251, 188, 0, 0.4), 0 0 40px rgba(251, 188, 0, 0.2);
        }
        50% {
          text-shadow: 0 0 20px rgba(251, 188, 0, 0.8), 0 0 40px rgba(251, 188, 0, 0.5), 0 0 60px rgba(251, 188, 0, 0.3);
        }
      }
      .animate-neon-glow { animation: neonGlow 2s ease-in-out infinite; }

      @keyframes tapFlash {
        0% { opacity: 0; }
        30% { opacity: 0.3; }
        100% { opacity: 0; }
      }
      .animate-tap-flash { animation: tapFlash 300ms ease-out forwards; }

      @keyframes percentFill {
        from { width: 0%; }
      }
      .animate-percent-fill { animation: percentFill 800ms ease-out forwards; }

      @keyframes confettiFall {
        0% { transform: translateY(-10vh) rotate(0deg); opacity: 1; }
        100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
      }

      .confetti-piece {
        position: fixed;
        width: 8px;
        height: 8px;
        top: -10px;
        z-index: 50;
        border-radius: 2px;
        animation: confettiFall linear forwards;
      }

      @keyframes floatParticle {
        0%, 100% { transform: translateY(0px) translateX(0px); opacity: 0.3; }
        25% { transform: translateY(-20px) translateX(10px); opacity: 0.6; }
        50% { transform: translateY(-10px) translateX(-5px); opacity: 0.4; }
        75% { transform: translateY(-30px) translateX(8px); opacity: 0.5; }
      }
      .animate-float-particle { animation: floatParticle 4s ease-in-out infinite; }

      @keyframes bounceIn {
        0% { transform: scale(0); opacity: 0; }
        50% { transform: scale(1.15); }
        70% { transform: scale(0.95); }
        100% { transform: scale(1); opacity: 1; }
      }
      .animate-bounce-in { animation: bounceIn 500ms ease-out forwards; }

      @keyframes slideReveal {
        from { opacity: 0; max-height: 0; }
        to { opacity: 1; max-height: 200px; }
      }
      .animate-slide-reveal { animation: slideReveal 400ms ease-out forwards; }

      @keyframes cardExit {
        to { opacity: 0; transform: translateX(-100%) rotate(-5deg); }
      }
      .animate-card-exit { animation: cardExit 300ms ease-in forwards; }

      /* Percentage bar shimmer */
      @keyframes shimmer {
        0% { background-position: -200% 0; }
        100% { background-position: 200% 0; }
      }
      .bar-shimmer {
        background-size: 200% 100%;
        animation: shimmer 2s ease-in-out infinite;
      }

      /* Scroll styling */
      ::-webkit-scrollbar { width: 4px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: #46464d; border-radius: 2px; }
    </style>
  </head>
  <body class="dark bg-surface text-on-surface">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
