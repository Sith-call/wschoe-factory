    <style>
      body { font-family: 'Plus Jakarta Sans', 'Noto Sans KR', sans-serif; background-color: #111417; color: #e1e2e7; }
      .text-gradient { background: linear-gradient(135deg, #fbbc00 0%, #ffb77d 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
      .btn-gradient { background: linear-gradient(135deg, #fbbc00 0%, #ffb77d 100%); }
      @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }
      .animate-fade-in { animation: fadeIn 200ms ease-out forwards; }
      @keyframes slideUp {
        from { opacity: 0; transform: translateY(100%); }
        to { opacity: 1; transform: translateY(0); }
      }
      .animate-slide-up { animation: slideUp 300ms ease-out forwards; }
      @keyframes celebrate {
        0% { transform: scale(1); opacity: 1; }
        50% { transform: scale(1.1); opacity: 0.8; }
        100% { transform: scale(1); opacity: 1; }
      }
      .animate-celebrate { animation: celebrate 500ms ease-out; }
      @keyframes petBounce {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-6px); }
      }
      .animate-pet-bounce { animation: petBounce 2s ease-in-out infinite; }
      @keyframes petEvolve {
        0% { transform: scale(1) rotate(0deg); }
        25% { transform: scale(1.3) rotate(-10deg); }
        50% { transform: scale(0.8) rotate(10deg); }
        75% { transform: scale(1.2) rotate(-5deg); }
        100% { transform: scale(1) rotate(0deg); }
      }
      .animate-pet-evolve { animation: petEvolve 800ms ease-out; }
      @keyframes slideDown {
        from { opacity: 0; transform: translateY(-100%); }
        to { opacity: 1; transform: translateY(0); }
      }
