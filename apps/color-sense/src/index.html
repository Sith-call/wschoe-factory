<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>컬러 감각 테스트</title>

    <!-- Archivo (Google Fonts) -->
    <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Wanted Sans Variable -->
    <link href="https://cdn.jsdelivr.net/gh/nicepayments/wanted-sans@latest/packages/wanted-sans-variable/WantedSansVariable.min.css" rel="stylesheet">

    <!-- Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Wanted Sans Variable', 'SUIT Variable', 'system-ui', 'sans-serif'],
              mono: ['Archivo', 'system-ui', 'sans-serif'],
            },
            colors: {
              background: '#fafafa',
              surface: '#ffffff',
              primary: '#7c3aed',
              'primary-light': '#ede9fe',
              border: '#e4e4e7',
              success: '#22c55e',
              danger: '#ef4444',
              'game-bg': '#1e1b2e',
            }
          }
        }
      }
    </script>
  </head>
  <body class="bg-background">
    <div id="root"></div>
    <script type="module" src="/main.tsx"></script>
  </body>
</html>
