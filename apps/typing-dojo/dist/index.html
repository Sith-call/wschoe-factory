<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>타자 도장</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR:wght@300;400;500;700&family=Space+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              cream: '#faf8f5',
              navy: '#1e3a5f',
              brass: '#c9a96e',
              ink: '#1a1a2e',
            },
            fontFamily: {
              sans: ['"IBM Plex Sans KR"', 'sans-serif'],
              mono: ['"Space Grotesk"', 'monospace'],
            },
          },
        },
      }
    </script>
    <style>
      body {
        font-family: 'IBM Plex Sans KR', sans-serif;
        background-color: #faf8f5;
        color: #1a1a2e;
      }

      @keyframes cursor-blink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0; }
      }

      .cursor-blink {
        animation: cursor-blink 1s step-end infinite;
      }

      @keyframes char-slide {
        from { transform: translateX(-4px); opacity: 0.6; }
        to { transform: translateX(0); opacity: 1; }
      }

      .char-correct {
        animation: char-slide 0.15s ease-out;
      }

      @keyframes belt-bounce {
        0% { transform: scale(1); }
        50% { transform: scale(1.15); }
        100% { transform: scale(1); }
      }

      .belt-bounce {
        animation: belt-bounce 0.4s ease-out;
      }

      @keyframes scale-in {
        from { transform: scale(0.95); opacity: 0; }
        to { transform: scale(1); opacity: 1; }
      }

      .scale-in {
        animation: scale-in 0.25s ease-out;
      }

      .stats-glow {
        box-shadow: 0 0 12px 2px rgba(201, 169, 110, 0.35);
      }

      @keyframes progress-flash {
        0% { opacity: 1; }
        50% { opacity: 0.6; }
        100% { opacity: 1; }
      }

      .progress-flash {
        animation: progress-flash 0.2s ease-out;
        height: 3px !important;
      }
    </style>
    <script type="module" crossorigin src="/assets/index-CyQxq-JF.js"></script>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
