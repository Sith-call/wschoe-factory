<!doctype html>
<html class="dark" lang="ko">

    <meta charset="UTF-8" />

    <title>리추얼 메이커 — Ritual Maker</title>

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "surface": "#0a0615",
              "on-background": "#e8e0ff",
              "surface-variant": "#2a1f4e",
              "surface-container-lowest": "#0d0820",
              "surface-container-highest": "#2a1f4e",
              "on-surface-variant": "#b0a8c9",
            },
            animation: {
              "fadeIn": "fadeIn 0.4s ease-out",
              "slideUp": "slideUp 0.5s ease-out",
              "floatUp": "floatUp 1s ease-out forwards",
              "bounce-slow": "bounce 2s infinite",
              "pulse-slow": "pulse 3s infinite",
              "breathe": "breathe 3s ease-in-out infinite",
              "shake": "shake 0.5s ease-in-out",
              "particle": "particle 2s ease-out infinite",
            },
            keyframes: {
              fadeIn: {
                "0%": { opacity: "0", transform: "translateY(8px)" },
                "100%": { opacity: "1", transform: "translateY(0)" },
              },
              slideUp: {
                "0%": { opacity: "0", transform: "translateY(20px)" },
                "100%": { opacity: "1", transform: "translateY(0)" },
              },
              floatUp: {
                "0%": { opacity: "1", transform: "translateY(0)" },
                "100%": { opacity: "0", transform: "translateY(-40px)" },
              },
              breathe: {
                "0%, 100%": { opacity: "0.3" },
                "50%": { opacity: "0.8" },
              },
              shake: {
                "0%, 100%": { transform: "translateX(0)" },
                "25%": { transform: "translateX(-8px)" },
                "75%": { transform: "translateX(8px)" },
              },
              particle: {
                "0%": { opacity: "0", transform: "translateY(0) scale(0)" },
                "20%": { opacity: "1", transform: "translateY(-20px) scale(1)" },
                "100%": { opacity: "0", transform: "translateY(-80px) scale(0.5)" },
              },
            },
          },
        },
      };
    </script>

    <style>
      @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap');

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
      }

      html, body, #root {
        height: 100%;
        width: 100%;
        max-width: 430px;
        margin: 0 auto;
        font-family: 'Noto Sans KR', system-ui, sans-serif;
        background: #0a0615;
        color: #e8e0ff;
        overflow-x: hidden;
        -webkit-font-smoothing: antialiased;
      }

      /* Background gradient */

      body::before {
        content: '';
        position: fixed;
        top: 0;
        left: 50%;
        transform: translateX(-50%);
        width: 430px;
        height: 100%;
        background:
          radial-gradient(ellipse 300px 400px at 50% 0%, rgba(139, 92, 246, 0.08) 0%, transparent 70%),
          radial-gradient(ellipse 200px 300px at 80% 30%, rgba(245, 158, 11, 0.05) 0%, transparent 60%),

        z-index: 0;
      }

      #root {
        position: relative;
        z-index: 1;
      }

      .safe-area-bottom {
        padding-bottom: env(safe-area-inset-bottom, 8px);
      }

      /* Scrollbar */

      ::-webkit-scrollbar { width: 3px; }

      ::-webkit-scrollbar-track { background: transparent; }

      ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }

      /* RPG floating particles */

      body::after {
        content: '';
        position: fixed;
        top: 0;
        left: 50%;
        transform: translateX(-50%);
        width: 430px;
        height: 100%;
        background-image:
          radial-gradient(1px 1px at 20% 30%, rgba(245, 158, 11, 0.3), transparent),
          radial-gradient(1px 1px at 80% 20%, rgba(139, 92, 246, 0.3), transparent),
          radial-gradient(1px 1px at 50% 60%, rgba(16, 185, 129, 0.2), transparent),
          radial-gradient(1px 1px at 30% 80%, rgba(245, 158, 11, 0.2), transparent),
          radial-gradient(1px 1px at 70% 50%, rgba(139, 92, 246, 0.2), transparent);
        animation: breathe 4s ease-in-out infinite;
        pointer-events: none;
        z-index: 0;
      }
    </style>
