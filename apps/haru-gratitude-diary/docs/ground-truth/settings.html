<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>설정 — 하루 감사 일기</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Manrope', sans-serif;
    background: #f2f0ea;
    display: flex;
    justify-content: center;
    min-height: 100vh;
  }
  .screen {
    width: 100%;
    max-width: 430px;
    min-height: 100vh;
    background: #fefcf4;
    position: relative;
  }
  .header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 16px 20px;
    position: sticky;
    top: 0;
    background: #fefcf4;
    z-index: 10;
  }
  .back-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 44px;
    height: 44px;
    border: none;
    background: none;
    cursor: pointer;
    border-radius: 8px;
  }
  .back-btn:active {
    background: rgba(77, 100, 78, 0.08);
  }
  .back-arrow {
    width: 24px;
    height: 24px;
    stroke: #36392d;
    stroke-width: 2;
    fill: none;
    stroke-linecap: round;
    stroke-linejoin: round;
  }
  .header-title {
    font-size: 18px;
    font-weight: 600;
    color: #36392d;
    line-height: 1.3;
  }
  .content {
    padding: 24px 20px 40px;
    display: flex;
    flex-direction: column;
    align-items: stretch;
  }
  .btn-secondary {
    display: block;
    width: 100%;
    padding: 14px 20px;
    border: 1.5px solid #4d644e;
    background: none;
    color: #4d644e;
    font-family: 'Manrope', sans-serif;
    font-size: 15px;
    font-weight: 600;
    border-radius: 10px;
    cursor: pointer;
    text-align: left;
    min-height: 48px;
    transition: background 0.15s ease;
  }
  .btn-secondary:active {
    background: rgba(77, 100, 78, 0.06);
  }
  .btn-danger {
    display: block;
    width: 100%;
    padding: 14px 20px;
    border: 1.5px solid #a54731;
    background: none;
    color: #a54731;
    font-family: 'Manrope', sans-serif;
    font-size: 15px;
    font-weight: 600;
    border-radius: 10px;
    cursor: pointer;
    text-align: left;
    min-height: 48px;
    margin-top: 12px;
    transition: background 0.15s ease;
  }
  .btn-danger:active {
    background: rgba(165, 71, 49, 0.06);
  }
  .divider {
    height: 32px;
  }
  .app-info {
    font-size: 13px;
    font-weight: 500;
    color: #8a8d82;
    line-height: 1.4;
    text-align: left;
  }
  .app-tagline {
    font-size: 14px;
    font-weight: 400;
    color: #8a8d82;
    line-height: 1.5;
    margin-top: 6px;
    text-align: left;
  }
</style>
</head>
<body>
<div class="screen">
  <!-- Header -->
  <header class="header">
    <button class="back-btn" aria-label="뒤로 가기">
      <svg class="back-arrow" viewBox="0 0 24 24">
        <polyline points="15 18 9 12 15 6"></polyline>
      </svg>
    </button>
    <h1 class="header-title">설정</h1>
  </header>

  <!-- Content -->
  <main class="content">
    <button class="btn-secondary">데모 데이터 생성</button>
    <button class="btn-danger">모든 데이터 삭제</button>

    <div class="divider"></div>

    <p class="app-info">하루 감사 일기 v1.0</p>
    <p class="app-tagline">매일 3줄로 나를 발견하는 시간</p>
  </main>
</div>
</body>
</html>
