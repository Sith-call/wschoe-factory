<!DOCTYPE html>

<style>
        body {
            background-color: #fefcf4;
            font-family: 'Manrope', sans-serif;
            -webkit-font-smoothing: antialiased;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .writing-surface {
            background: radial-gradient(circle at top left, #fefcf4 0%, #fbfaef 100%);
        }

<style>
    body {
      min-height: max(884px, 100dvh);
    }

<body class="bg-surface text-on-surface min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="bg-[#fefcf4] dark:bg-stone-950/80 sticky top-0 z-50 no-border backdrop-blur-md flex items-center justify-between px-6 h-16 w-full">
<div class="flex items-center">
<button class="text-[#4d644e] dark:text-[#8DA68D] hover:bg-[#fbfaef] dark:hover:bg-stone-900 transition-colors p-2 rounded-full active:opacity-70">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
</div>
<h1 class="font-['Manrope'] font-bold text-lg tracking-tight text-[#4d644e] dark:text-[#8DA68D]">
            2026년 4월 10일
        </h1>
<div class="w-10"></div> <!-- Spacer for balance -->
</header>
<!-- Content Canvas -->
<main class="flex-grow writing-surface flex flex-col px-8 pt-12 pb-32 max-w-2xl mx-auto w-full">
<!-- Instructional Header -->
<div class="mb-12">
<h2 class="text-3xl font-extrabold text-on-surface tracking-tight mb-2">오늘의 감사</h2>
<p class="text-on-surface-variant text-lg leading-relaxed">작은 감사함들이 모여 단단한 하루를 만듭니다.</p>
</div>
<!-- Input Section: Stacked Fields -->
<div class="space-y-10">
<!-- Entry 1 -->
<div class="group flex flex-col space-y-4">
<div class="flex items-baseline space-x-4">
<span class="text-primary/30 font-extrabold text-4xl">1</span>
<textarea class="w-full bg-transparent border-none border-b border-outline-variant/15 focus:ring-0 focus:border-primary text-xl font-medium placeholder:text-on-surface-variant/40 resize-none transition-all duration-300 py-2" placeholder="감사한 일을 적어보세요" rows="2"></textarea>
</div>
</div>
<!-- Entry 2 -->
<div class="group flex flex-col space-y-4">
<div class="flex items-baseline space-x-4">
<span class="text-primary/30 font-extrabold text-4xl">2</span>
<textarea class="w-full bg-transparent border-none border-b border-outline-variant/15 focus:ring-0 focus:border-primary text-xl font-medium placeholder:text-on-surface-variant/40 resize-none transition-all duration-300 py-2" placeholder="감사한 일을 적어보세요" rows="2"></textarea>
</div>
</div>
<!-- Entry 3 -->
<div class="group flex flex-col space-y-4">
<div class="flex items-baseline space-x-4">
<span class="text-primary/30 font-extrabold text-4xl">3</span>
<textarea class="w-full bg-transparent border-none border-b border-outline-variant/15 focus:ring-0 focus:border-primary text-xl font-medium placeholder:text-on-surface-variant/40 resize-none transition-all duration-300 py-2" placeholder="감사한 일을 적어보세요" rows="2"></textarea>
</div>
</div>
</div>
<!-- Visual Anchor: Tonal Decorative Element -->
<div class="mt-20 flex justify-center opacity-20">
<div class="w-16 h-1 bg-primary rounded-full"></div>
</div>
</main>
<!-- Bottom Action Bar -->
<div class="fixed bottom-0 left-0 w-full p-8 bg-gradient-to-t from-surface via-surface/90 to-transparent">
<button class="w-full bg-primary text-on-primary font-bold text-lg py-5 rounded-xl shadow-lg hover:brightness-110 active:scale-95 transition-all duration-200 tracking-wider">
            저장
        </button>
</div>
<!-- Hidden Bottom Nav Suppression Logic: This screen is focused/transactional, so the global BottomNavBar is hidden in favor of the Save action -->
</body></html>
