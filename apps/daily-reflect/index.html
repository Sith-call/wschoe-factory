<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>하루 회고</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              /* Stitch design system colors */
              "surface": "#111417",
              "surface-container-low": "#191c1f",
              "surface-container": "#1d2023",
              "surface-container-high": "#282a2e",
              "surface-container-highest": "#323539",
              "surface-bright": "#37393d",
              "on-surface": "#e1e2e7",
              "on-surface-variant": "#c7c5ce",
              "outline": "#919097",
              "outline-variant": "#46464d",
              "primary": "#fbbc00",
              "secondary": "#ffb77d",
              "on-primary": "#402d00",
              /* Keep night aliases for compatibility */
              night: {
                50: '#f0f0f8',
                100: '#e1e2e7',
                200: '#c7c5ce',
                300: '#919097',
                400: '#46464d',
                500: '#323539',
                600: '#282a2e',
                700: '#1d2023',
                800: '#191c1f',
                900: '#111417',
                950: '#0c0e12',
              },
              warm: {
                amber: '#fbbc00',
                orange: '#ffb77d',
                pink: '#e87c8a',
                peach: '#f0b8a0',
              },
              emotion: {
                happy: '#FFD93D',
                calm: '#6BCB77',
                grateful: '#FF8E71',
                tired: '#9B9ECE',
                anxious: '#FF6B6B',
                sad: '#4D96FF',
              }
            },
            fontFamily: {
              headline: ['Manrope', 'Noto Sans KR', 'sans-serif'],
              body: ['Plus Jakarta Sans', 'Noto Sans KR', 'sans-serif'],
              sans: ['Plus Jakarta Sans', 'Noto Sans KR', 'sans-serif'],
            }
          }
        }
      }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&family=Plus+Jakarta+Sans:wght@400;500;600&family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <style>
      body { font-family: 'Plus Jakarta Sans', 'Noto Sans KR', sans-serif; background-color: #111417; color: #e1e2e7; }
      .orb-glow { filter: blur(80px); opacity: 0.15; }
      .reflection-orb { background: linear-gradient(135deg, #fbbc00 0%, #ffb77d 100%); box-shadow: 0 0 40px rgba(251, 188, 0, 0.3); }
      .text-gradient { background: linear-gradient(135deg, #fbbc00 0%, #ffb77d 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
      .btn-gradient { background: linear-gradient(135deg, #fbbc00 0%, #ffb77d 100%); }
      .emotion-glow { box-shadow: 0 0 20px var(--glow-color, rgba(251,188,0,0.3)); }
      .battery-fill { transition: height 0.3s ease-out; }
      @keyframes fadeInUp {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .animate-fade-in-up { animation: fadeInUp 0.5s ease-out forwards; }
      @keyframes pulse-soft {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.7; }
      }
      .animate-pulse-soft { animation: pulse-soft 2s ease-in-out infinite; }
      @keyframes particle-rise {
        0% { opacity: 0.8; transform: translateY(0) scale(1); }
        100% { opacity: 0; transform: translateY(-200px) scale(0.3); }
      }
    </style>
  </head>
  <body class="dark bg-surface text-on-surface">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
